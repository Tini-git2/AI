<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Lung Diagnostics & Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* ==========================================================================
           ADVANCED AI BIOMEDICAL HUD INTERFACE WITH CARBON NANO-NETWORKS
           ========================================================================== */
        body {
            margin: 0;
            padding: 0;
            background: #030512; 
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient Sci-Fi Depth Layers */
        .ai-backdrop-matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            background: 
                radial-gradient(circle at 15% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 70%, rgba(255, 20, 147, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #05081c 0%, #02030a 100%);
        }

        /* High-Performance Animation Layer */
        #neuralPulseCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            display: block;
        }

        /* Digital HUD Scanning Overlay */
        .hud-scan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 24, 48, 0) 96%, rgba(0, 191, 255, 0.04) 98%, rgba(0, 191, 255, 0.1) 100%),
                linear-gradient(to bottom, rgba(3, 5, 18, 0), rgba(3, 5, 18, 0.4));
            background-size: 100% 100%, 100% 4px;
            animation: hudScan 8s linear infinite;
        }

        @keyframes hudScan {
            0% { background-position: 0 -100vh, 0 0; }
            100% { background-position: 0 100vh, 0 0; }
        }

        /* --- Content Layout Wrapper --- */
        .scene-wrapper {
            position: relative;
            max-width: 680px; 
            width: 90%;
            margin: 5% auto;
            z-index: 10; 
        }

        /* --- ULTRA-TRANSPARENT FLOATING CONTAINER WITH VIBRANT NEON GLOW --- */
        .container {
            background: rgba(4, 6, 14, 0.12); 
            backdrop-filter: blur(8px) saturate(160%);
            -webkit-backdrop-filter: blur(8px) saturate(160%);
            border-radius: 24px;
            padding: 35px 40px; 
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid rgba(0, 229, 255, 0.75);
            box-shadow: 
                0 0 20px rgba(0, 229, 255, 0.35),
                0 0 40px rgba(255, 20, 147, 0.15),
                inset 0 0 25px rgba(0, 229, 255, 0.08);
            position: relative;
        }

        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid #ff1493;
            pointer-events: none;
        }
        .container::before { top: -1px; left: -1px; border-right: none; border-bottom: none; border-top-left-radius: 24px;}
        .container::after { bottom: -1px; right: -1px; border-left: none; border-top: none; border-bottom-right-radius: 24px;}

        h1 {
            font-size: 1.9rem; 
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #ffffff 30%, #00e5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: rgba(0, 229, 255, 0.7);
            margin: 0 0 30px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 25px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(6, 10, 26, 0.5);
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
            letter-spacing: 0.5px;
        }

        select:focus, input[type="number"]:focus {
            border-color: #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.45);
            background: rgba(10, 16, 41, 0.85);
            transform: scale(1.01);
        }

        select option {
            background: #090e24;
            color: #ffffff;
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00e5ff 0%, #ff1493 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
        }

        button[type="submit"]:hover {
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.6), 0 0 30px rgba(255, 20, 147, 0.6);
            transform: translateY(-2px);
            letter-spacing: 3px;
        }

        .spiral-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px auto 0 auto;
            position: relative;
            width: 60px;
            height: 60px;
        }
        .spiral-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed #00e5ff;
            border-radius: 50%;
            animation: spinRevolve 2s linear infinite;
        }
        .spiral-inner {
            position: absolute;
            width: 75%;
            height: 75%;
            border: 2px solid transparent;
            border-left-color: #ff1493;
            border-right-color: #ff1493;
            border-radius: 50%;
            animation: spinCounterRevolve 1.2s linear infinite;
        }
        .spiral-core {
            position: absolute;
            width: 30%;
            height: 30%;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 15px #00e5ff;
        }

        @keyframes spinRevolve { 100% { transform: rotate(360deg); } }
        @keyframes spinCounterRevolve { 100% { transform: rotate(-360deg); } }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 14px;
            background: rgba(255, 20, 147, 0.1);
            border: 1px solid rgba(255, 20, 147, 0.4);
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.25);
        }
        .result h2 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.5);
        }
        .result p {
            margin: 0;
            color: rgba(0, 229, 255, 0.9);
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="ai-backdrop-matrix"></div>
<canvas id="neuralPulseCanvas"></canvas>
<div class="hud-scan-overlay"></div>

<div class="scene-wrapper">
    <div class="container animate__animated animate__fadeIn">

        <h1>Lung Cancer Prediction System 🫁</h1>
        <p class="subtitle">Moving prediction web dashboard</p>

        <form id="predictionForm" action="/predict" method="POST">
            <div class="grid">
                <select name="GENDER" required>
                    <option value="">Select Gender</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                </select>

                <input type="number" name="AGE" placeholder="Age (e.g. 45)" required>

                <select name="SMOKING" required>
                    <option value="">Smoking</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>

                <select name="YELLOW_FINGERS" required>
                    <option value="">Yellow Fingers</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>

                <select name="ANXIETY" required>
                    <option value="">Anxiety</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>

                <select name="PEER_PRESSURE" required>
                    <option value="">Peer Pressure</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>

                <select name="CHRONIC_DISEASE" required>
                    <option value="">Chronic Disease</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>

                <select name="FATIGUE" required>
                    <option value="">Fatigue</option>
                    <option value="YES">Yes</option>
                    <option value="NO">No</option>
                </select>
            </div>

            <button type="submit">Predict</button>
        </form>

        <div id="loadingSpiral" class="spiral-container animate__animated animate__zoomIn" style="display: none;">
            <div class="spiral-outer"></div>
            <div class="spiral-inner"></div>
            <div class="spiral-core"></div>
        </div>

        {% if prediction_text %}
        <div class="result animate__animated animate__pulse">
            <h2>Prediction: {{ prediction_text }}</h2>
            {% if probability is not none %}
                <p>Risk Probability: {{ probability }}%</p>
            {% endif %}
        </div>
        {% endif %}

    </div>
</div>

<script>
  const canvas = document.getElementById('neuralPulseCanvas');
  const ctx = canvas.getContext('2d');

  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
  });

  let globalTime = 0;

  // 1. HORIZONTAL DYNAMIC VESSEL NETWORK STREAMS
  class BiometricStream {
      constructor() {
          this.reset(true);
      }

      reset(initAll = false) {
          this.x = initAll ? Math.random() * width : -200;
          this.y = Math.random() * height;
          this.speed = Math.random() * 2.0 + 1.5;
          this.amplitude = Math.random() * 40 + 15;
          this.frequency = Math.random() * 0.004 + 0.002;
          this.thickness = Math.random() * 2.0 + 1;
          this.colorScheme = Math.random() > 0.5 ? '#00e5ff' : '#ff1493';
      }

      update() {
          this.x += this.speed;
          if (this.x > width + 200) {
              this.reset(false);
          }
      }

      draw() {
          ctx.save();
          ctx.beginPath();
          
          const spanLength = 350;
          for (let i = 0; i < spanLength; i += 4) {
              let evalX = this.x - spanLength + i;
              let evalY = this.y + Math.sin(evalX * this.frequency) * this.amplitude;
              evalY += Math.cos(evalX * 0.015 + globalTime) * 8;

              if (i === 0) ctx.moveTo(evalX, evalY);
              else ctx.lineTo(evalX, evalY);
          }

          let grad = ctx.createLinearGradient(this.x - spanLength, this.y, this.x, this.y);
          grad.addColorStop(0, 'transparent');
          grad.addColorStop(0.3, rgbaConvert(this.colorScheme, 0.08));
          grad.addColorStop(0.8, this.colorScheme);
          grad.addColorStop(1, '#ffffff');

          ctx.strokeStyle = grad;
          ctx.lineWidth = this.thickness;
          ctx.shadowBlur = 12;
          ctx.shadowColor = this.colorScheme;
          ctx.stroke();

          if (Math.random() * 100 > 96) {
              ctx.beginPath();
              let nodeY = this.y + Math.sin(this.x * this.frequency) * this.amplitude + Math.cos(this.x * 0.015 + globalTime) * 8;
              ctx.arc(this.x, nodeY, this.thickness * 2.2, 0, Math.PI * 2);
              ctx.fillStyle = '#ffffff';
              ctx.shadowBlur = 20;
              ctx.fill();
          }
          ctx.restore();
      }
  }

  function rgbaConvert(hex, alpha) {
      let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  // 2. BLUE-PINK GLOWING CARBON NANO-LATTICE GRID
  class CarbonNetworkGrid {
      constructor() {
          this.nodeCount = 35;
          this.nodes = [];
          for (let i = 0; i < this.nodeCount; i++) {
              let isCyanBlue = i % 2 === 0;
              this.nodes.push({
                  x: Math.random() * width,
                  y: Math.random() * height,
                  speedX: Math.random() * 0.4 + 0.4, 
                  radius: Math.random() * 2.5 + 2, 
                  pulseOffset: Math.random() * Math.PI,
                  color: isCyanBlue ? '#00e5ff' : '#ff1493',       
                  glowColor: isCyanBlue ? 'rgba(0, 229, 255, 0.8)' : 'rgba(255, 20, 147, 0.8)'    
              });
          }
      }

      update() {
          this.nodes.forEach(node => {
              node.x += node.speedX;
              if (node.x > width + 50) {
                  node.x = -50;
                  node.y = Math.random() * height;
              }
          });
      }

      draw() {
          ctx.save();
          for (let i = 0; i < this.nodeCount; i++) {
              let n1 = this.nodes[i];
              for (let j = i + 1; j < this.nodeCount; j++) {
                  let n2 = this.nodes[j];
                  let dist = Math.hypot(n1.x - n2.x, n1.y - n2.y);

                  if (dist < 160) {
                      ctx.beginPath();
                      ctx.moveTo(n1.x, n1.y);
                      ctx.lineTo(n2.x, n2.y);
                      
                      let edgeAlpha = (1 - (dist / 160)) * 0.28; 
                      let lineGrad = ctx.createLinearGradient(n1.x, n1.y, n2.x, n2.y);
                      lineGrad.addColorStop(0, n1.color === '#00e5ff' ? `rgba(0, 229, 255, ${edgeAlpha})` : `rgba(255, 20, 147, ${edgeAlpha})`);
                      lineGrad.addColorStop(1, n2.color === '#00e5ff' ? `rgba(0, 229, 255, ${edgeAlpha})` : `rgba(255, 20, 147, ${edgeAlpha})`);
                      
                      ctx.strokeStyle = lineGrad;
                      ctx.lineWidth = 1.2;
                      ctx.stroke();
                  }
              }
          }

          this.nodes.forEach(node => {
              let liveGlow = 0.5 + Math.sin(globalTime * 1.2 + node.pulseOffset) * 0.4;
              ctx.beginPath();
              ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
              ctx.fillStyle = node.color;
              ctx.shadowBlur = 10;
              ctx.shadowColor = node.color;
              ctx.fill();
              
              ctx.beginPath();
              ctx.arc(node.x, node.y, node.radius * 0.4, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(255, 255, 255, ${liveGlow})`;
              ctx.fill();
          });
          ctx.restore();
      }
  }

  // 3. EXPLICIT ANATOMICAL LUNGS (Brought even closer together)
  class AdvancedAILungs {
      constructor() {
          this.baseY = height * 0.48;
          // MODIFIED: Reduced from 165 to 90 to match closely underneath the visual layer
          this.separationDist = 90; 
      }

      draw() {
          const respirationFactor = 0.96 + Math.sin(globalTime * 0.8) * 0.035;
          const centerX = width / 2;

          // PART A: Central Windpipe
          ctx.save();
          ctx.translate(centerX, this.baseY);
          ctx.scale(respirationFactor, respirationFactor);

          ctx.lineWidth = 20;
          ctx.strokeStyle = 'rgba(0, 229, 255, 0.08)';
          ctx.beginPath(); ctx.moveTo(0, -260); ctx.lineTo(0, -60); ctx.stroke();

          ctx.lineWidth = 6;
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
          ctx.beginPath(); ctx.moveTo(0, -255); ctx.lineTo(0, -65); ctx.stroke();

          ctx.lineWidth = 2.5;
          ctx.strokeStyle = '#00e5ff';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#00e5ff';
          for (let ry = -245; ry <= -75; ry += 14) {
              ctx.beginPath();
              ctx.arc(0, ry, 11, 0, Math.PI, false); 
              ctx.stroke();
          }

          ctx.lineWidth = 7;
          ctx.strokeStyle = 'rgba(0, 229, 255, 0.65)';
          ctx.beginPath(); ctx.moveTo(0, -65); ctx.quadraticCurveTo(-30, -55, -50, -20); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, -65); ctx.quadraticCurveTo(30, -55, 50, -20); ctx.stroke();
          ctx.restore();

          // PART B: Symmetrical Human Lung Lobes
          ['left', 'right'].forEach(side => {
              const sign = side === 'left' ? -1 : 1;
              const currentLobeX = centerX + (this.separationDist * sign);

              ctx.save();
              ctx.translate(currentLobeX, this.baseY);
              ctx.scale(respirationFactor * (side === 'left' ? 1 : -1), respirationFactor);

              ctx.beginPath();
              ctx.moveTo(-10, -130); 
              ctx.bezierCurveTo(-75, -155, -170, -90, -180, 20); 
              ctx.bezierCurveTo(-190, 110, -140, 190, -70, 185); 
              ctx.bezierCurveTo(-35, 180, -20, 140, -15, 120); 
              ctx.bezierCurveTo(-5, 80, -2, 30, 0, 0);
              ctx.closePath();

              let coreGrad = ctx.createRadialGradient(-50, 10, 5, -70, 30, 170);
              coreGrad.addColorStop(0, 'rgba(0, 229, 255, 0.35)');     
              coreGrad.addColorStop(0.4, 'rgba(255, 20, 147, 0.15)');  
              coreGrad.addColorStop(0.85, 'rgba(10, 15, 45, 0.04)');
              coreGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');

              ctx.fillStyle = coreGrad;
              ctx.shadowBlur = 40;
              ctx.shadowColor = 'rgba(0, 229, 255, 0.2)';
              ctx.fill();

              ctx.lineWidth = 2.2;
              ctx.strokeStyle = side === 'left' ? 'rgba(0, 229, 255, 0.5)' : 'rgba(255, 20, 147, 0.5)';
              ctx.stroke();

              ctx.save();
              ctx.shadowBlur = 14;
              ctx.shadowColor = '#00e5ff';
              
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.65)';
              ctx.lineWidth = 3.5;
              ctx.beginPath();
              ctx.moveTo(-20, -20);
              ctx.quadraticCurveTo(-70, -5, -125, -15);
              ctx.moveTo(-55, -10);
              ctx.quadraticCurveTo(-95, -45, -140, -40);
              ctx.stroke();

              ctx.strokeStyle = 'rgba(255, 20, 147, 0.6)';
              ctx.lineWidth = 2.5;
              ctx.beginPath();
              ctx.moveTo(-20, -20);
              ctx.quadraticCurveTo(-60, 35, -120, 30);
              ctx.moveTo(-60, 15);
              ctx.quadraticCurveTo(-105, 70, -155, 75);
              ctx.stroke();

              ctx.fillStyle = '#00e5ff';
              for (let i = 0; i < 3; i++) {
                  ctx.beginPath();
                  ctx.arc(-90 - (i * 20), 10 + (i * 25), 2.5, 0, Math.PI * 2);
                  ctx.fill();
              }
              ctx.restore();
              ctx.restore();
          });
      }
  }

  // 4. MATRIX BACKGROUND
  class TechMatrixGrid {
      constructor() {
          this.nodes = Array.from({length: 15}, () => ({
              x: Math.random() * width,
              y: Math.random() * height,
              size: Math.random() * 1.5 + 0.5,
              opacity: Math.random() * 0.6 + 0.2,
              pulseSpeed: Math.random() * 0.02 + 0.01
          }));
      }

      draw() {
          ctx.save();
          this.nodes.forEach(node => {
              node.opacity += Math.sin(globalTime * node.pulseSpeed) * 0.01;
              ctx.fillStyle = `rgba(0, 229, 255, ${Math.max(0.1, Math.min(node.opacity, 0.8))})`;
              ctx.fillRect(node.x, node.y, node.size, node.size);
          });
          ctx.restore();
      }
  }

  const lungDiagnostics = new AdvancedAILungs();
  const matrixGrid = new TechMatrixGrid();
  const carbonLatticeNet = new CarbonNetworkGrid();
  const horizontalVesselStreams = Array.from({ length: 15 }, () => new BiometricStream());

  function animateSystem() {
      ctx.fillStyle = 'rgba(3, 5, 18, 0.22)'; 
      ctx.fillRect(0, 0, width, height);
      
      globalTime += 0.03; 

      matrixGrid.draw();
      carbonLatticeNet.update();
      carbonLatticeNet.draw();
      lungDiagnostics.draw();

      horizontalVesselStreams.forEach(stream => {
          stream.update();
          stream.draw();
      });

      requestAnimationFrame(animateSystem);
  }
  animateSystem();

  document.getElementById('predictionForm').addEventListener('submit', function() {
      document.getElementById('loadingSpiral').style.display = 'flex';
  });
</script>

</body>
</html>
